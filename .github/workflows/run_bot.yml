name: FPL Twitter Bot Runner

on:
  schedule:
    - cron: '0 * * * *' # This tells the bot to run at the top of every hour
  workflow_dispatch: # This creates a manual "Run" button so we can test it!

permissions:
  contents: write # Allows the bot to save its memory (injuries) back to your folder

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install required tools
        run: pip install requests tweepy
        
      - name: Run FPL Bot
        env:
          TWITTER_CONSUMER_KEY: ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python bot.py
        
      - name: Save memory (Update state file)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add fpl_state.json
          git commit -m "Update FPL memory" || exit 0
          git push
