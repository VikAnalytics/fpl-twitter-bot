<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 260px;
    background: #070d1a;
    color: #e2e8f4;
    font-family: 'Courier New', monospace;
    padding: 20px;
  }
  .logo { font-size: 17px; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 4px; }
  .logo span { color: #38bdf8; }
  .tagline { font-size: 10px; color: #64748b; letter-spacing: 0.06em; margin-bottom: 20px; }
  .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 16px 0; }
  .status-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: #64748b; margin-bottom: 10px;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }
  .dot.green { background: #10b981; box-shadow: 0 0 6px rgba(16,185,129,0.6); }
  .dot.grey  { background: #334155; }
  .hint {
    font-size: 10px; color: #334155; line-height: 1.6;
  }
  .hint strong { color: #64748b; }
</style>
</head>
<body>
<div class="logo">FPL<span>Gaffer</span></div>
<div class="tagline">Squad Analysis · Transfer Advisor</div>

<div class="status-row">
  <div class="dot green" id="dot"></div>
  <span id="status-text">Connected to FPL Gaffer</span>
</div>

<div class="divider"></div>

<p class="hint">
  Navigate to your <strong>FPL team page</strong> and click the blue button that appears in the bottom-right corner.
</p>

<script src="popup.js"></script>
</body>
</html>
