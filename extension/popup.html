<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 300px;
    background: #070d1a;
    color: #e2e8f4;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 20px;
  }
  .logo { font-size: 17px; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 4px; }
  .logo span { color: #38bdf8; }
  .tagline { font-size: 10px; color: #64748b; letter-spacing: 0.06em; margin-bottom: 18px; }

  .section-label {
    font-size: 9px; color: #38bdf8; letter-spacing: 0.2em;
    text-transform: uppercase; margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .section-label::before { content: '//'; opacity: 0.5; }

  label {
    display: block; font-size: 9px; color: #64748b;
    letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px;
  }
  input {
    width: 100%; background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
    color: #e2e8f4; font-family: inherit; font-size: 12px;
    padding: 8px 10px; outline: none; margin-bottom: 8px;
    transition: border-color 0.15s;
  }
  input:focus { border-color: #38bdf8; }

  .btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
  button {
    flex: 1; background: #38bdf8; color: #070d1a;
    border: none; font-family: inherit; font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; padding: 8px; cursor: pointer;
    text-transform: uppercase; transition: filter 0.15s;
  }
  button:hover { filter: brightness(1.1); }
  button.secondary {
    background: transparent; color: #64748b;
    border: 1px solid rgba(255,255,255,0.1);
    font-weight: 400;
  }
  button.secondary:hover { border-color: #38bdf8; color: #38bdf8; filter: none; }

  .status { font-size: 11px; min-height: 16px; margin-bottom: 14px; line-height: 1.4; }
  .status.ok   { color: #10b981; }
  .status.err  { color: #f43f5e; }
  .status.info { color: #38bdf8; }

  .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 14px 0; }

  .hint {
    font-size: 9.5px; color: #64748b; line-height: 1.65;
  }
  .hint a { color: #38bdf8; text-decoration: none; }
  .hint code {
    color: #a5b4fc; background: rgba(165,180,252,0.08);
    padding: 1px 5px; font-size: 9px;
  }
  .step { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
  .step-num {
    flex-shrink: 0; width: 16px; height: 16px;
    background: rgba(56,189,248,0.12); border: 1px solid rgba(56,189,248,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: #38bdf8; font-weight: 700;
  }
</style>
</head>
<body>
<div class="logo">FPL<span>Gaffer</span></div>
<div class="tagline">Squad Analysis · Transfer Advisor</div>

<div class="section-label">Backend URL</div>
<label for="backendUrl">Server address</label>
<input type="text" id="backendUrl" placeholder="https://your-app.up.railway.app">

<div class="btn-row">
  <button id="save">Save</button>
  <button id="test" class="secondary">Test</button>
</div>
<div class="status" id="status"></div>

<div class="divider"></div>

<div class="section-label">Setup Guide</div>
<div class="hint">
  <div class="step"><span class="step-num">1</span><span>Deploy the backend to <a href="#" id="railway-link">Railway</a> (free)</span></div>
  <div class="step"><span class="step-num">2</span><span>Set <code>OPENAI_API_KEY</code> in Railway environment variables</span></div>
  <div class="step"><span class="step-num">3</span><span>Paste your Railway URL above and click Save</span></div>
  <div class="step"><span class="step-num">4</span><span>Navigate to your FPL team page — the sidebar appears automatically</span></div>
</div>

<script src="popup.js"></script>
</body>
</html>
